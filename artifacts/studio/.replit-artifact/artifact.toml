kind = "web"
previewPath = "/"
title = "The Syndicate Studio OS"
version = "1.0.0"
id = "artifacts/studio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18425

[services.development]
run = "pnpm --filter @workspace/studio run dev"

# Compression/caching switch (2026-07): production no longer uses the platform's
# static handoff. The studio is served by artifacts/studio/server/serve.mjs —
# same model as the api-server, same single deployment. The server owns the
# clean-URL routing (generated from src/lib/seo-route-registry.ts, drift-guarded
# by seo:rewrites:check), the real 404.html, Brotli/gzip via build-emitted
# .br/.gz twins (originals byte-untouched), and cache headers (immutable on
# /assets/*, no-cache+ETag on HTML). The old serve = "static" + publicDir +
# generated [[services.production.rewrites]] block is REMOVED — routing lives
# in the server now, from the same registry.

[services.production]

[services.production.build]
args = [ "pnpm", "--filter", "@workspace/studio", "run", "build" ]

[services.production.build.env]
NODE_ENV = "production"
PORT = "18425"
BASE_PATH = "/"

[services.production.run]
args = [ "node", "artifacts/studio/server/serve.mjs" ]

[services.production.run.env]
PORT = "18425"
NODE_ENV = "production"
BASE_PATH = "/"

[services.production.health.startup]
path = "/"

[services.env]
PORT = "18425"
BASE_PATH = "/"
