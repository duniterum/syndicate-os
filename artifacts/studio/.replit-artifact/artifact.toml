kind = "web"
previewPath = "/"
title = "The Syndicate Studio OS"
version = "1.0.0"
id = "artifacts/studio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18425

[services.development]
run = "pnpm --filter @workspace/studio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/studio", "run", "build" ]
publicDir = "artifacts/studio/dist/public"
serve = "static"

# Slice 2.0 (rendering fix): the build prerenders one FLAT static HTML per public
# route (scripts/prerender-routes.ts) — /status -> status.html, home -> index.html
# — plus a real 404.html. Flat files (NOT <route>/index.html directories) are
# deliberate: a directory makes the static host auto-redirect /status -> /status/
# (the directory redirect fires BEFORE any rewrite), which breaks "served URL ==
# <link rel=canonical>". Confirmed live on Replit 2026-07-10. The old blanket SPA
# rewrite (/* -> /index.html) is REMOVED (it forced a soft-404 200 on unknown paths).
#
# Live serving is owned by the deploy layer (Replit handoff): serve each no-slash
# route directly from its flat <route>.html at 200 (no directory redirect, and NO
# deploy-layer flatten step — the build already emits flat files); return 404.html
# with a real HTTP 404 for unmatched paths. (www->apex 301 is DEFERRED to the
# domain transfer ~Sept 2026 — registrar-level, not here; HSTS/preload = Phase 6.)

[services.env]
PORT = "18425"
BASE_PATH = "/"
