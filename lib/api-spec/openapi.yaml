openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: source-status
    description: Source posture registry (read-only, posture-only)
  - name: protocol-reality
    description: Read-only protocol reality envelope (canon + Avalanche C-Chain RPC)
  - name: source-validate
    description: Read-only Verified Introduction (source) validation against SourceRegistryV1
  - name: join-quote
    description: Read-only MembershipSaleV3 quote (no wallet, no write, no transaction)
  - name: holder-index
    description: Aggregate-only Holder Index snapshot (static, hash-pinned, era-labelled)
  - name: verify-links
    description: Read-only explorer verify links for protocol infrastructure (never member wallets)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /source-status:
    get:
      operationId: getSourceStatus
      tags: [source-status]
      summary: Source posture registry
      description: >-
        Posture-only, read-only source-status registry. Every category value is
        null by design; no live values, balances, addresses, or member data are
        ever returned.
      responses:
        "200":
          description: Posture-only source registry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceStatusResponse"
  /source/validate:
    get:
      operationId: getSourceValidate
      tags: [source-validate]
      summary: Validate a Verified Introduction source id (read-only)
      description: >-
        Read-only validation of a client-supplied bytes32 source id against
        SourceRegistryV1 (sourceExists + isActive). The source id is NEVER
        echoed back, and no wallets, addresses, terms, or economic fields from
        the on-chain source configuration are ever returned — only existence
        and active-state booleans. Fails closed: on wrong chain, missing code,
        or decode failure the affected value is null with a failureReason.
      parameters:
        - name: sourceId
          in: query
          required: true
          description: bytes32 hex source id (0x + 64 hex). Never echoed back.
          schema:
            type: string
            maxLength: 66
      responses:
        "200":
          description: Read-only source validation result (source id never echoed)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceValidateResponse"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThrottledError"
  /join/quote:
    get:
      operationId: getJoinQuote
      tags: [join-quote]
      summary: Read-only MembershipSaleV3 quote
      description: >-
        Read-only quote from the active MembershipSaleV3 engine via eth_call.
        Amounts are EXACT raw base-unit strings (never humanized; decimals are
        metadata). The quote is computed for an anonymous recipient (zero
        address); no wallet is connected, no approval or transaction is
        prepared, and no write surface exists. If a sourceId is supplied it is
        applied ONLY when it exists and is active on SourceRegistryV1 —
        otherwise the quote fails closed with a failureReason (never a silent
        fallback). The source id is never echoed back.
      parameters:
        - name: grossUsdc
          in: query
          required: true
          description: Exact raw 6-decimal USDC base-unit amount as a base-10 string.
          schema:
            type: string
            maxLength: 30
        - name: sourceId
          in: query
          required: false
          description: Optional bytes32 hex source id (0x + 64 hex). Never echoed back.
          schema:
            type: string
            maxLength: 66
      responses:
        "200":
          description: Read-only quote result (raw base-unit strings)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JoinQuoteResponse"
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThrottledError"
  /protocol/reality:
    get:
      operationId: getProtocolReality
      tags: [protocol-reality]
      summary: Read-only protocol reality envelope
      description: >-
        Read-only protocol observability envelope. Reads verified public facts
        from vendored canon and Avalanche C-Chain RPC — chain reachability,
        contract code presence, ERC-20 token metadata, archive posture, and
        read-only sale-engine state (lifecycle flags plus public V3 sale figures:
        available SYN, total gross USDC, and receipt count, surfaced as exact raw
        base units), normalized into one envelope. No addresses, private keys,
        secrets, per-account balances, or financial-upside framing are ever
        returned, and no wallet/write surface exists. On any read failure the
        affected value is null with an explicit lifecycle and failureReason; the
        endpoint still responds 200.
      responses:
        "200":
          description: Read-only protocol reality envelope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProtocolRealityResponse"
  /protocol/verify-links:
    get:
      operationId: getProtocolVerifyLinks
      tags: [verify-links]
      summary: Explorer verify links for protocol infrastructure
      description: >-
        Read-only "Don't trust — verify" link set. Returns block-explorer URLs
        for PROTOCOL INFRASTRUCTURE ONLY — sale contracts (V1/V2A/V2/V3), the
        Archive1155 NFT contract, the vault and operations wallets, the Trader
        Joe LP pair, the SYN token, the canonical burn (dead) address, and
        SourceRegistryV1. Links are built server-side from vendored canon;
        entries whose address is not a live canonical address are omitted
        (fail-closed, never invented). No member or personal wallet is ever
        included, and no write surface exists.
      responses:
        "200":
          description: Explorer verify links (protocol infrastructure only)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyLinksResponse"
  /holder-index:
    get:
      operationId: getHolderIndex
      tags: [holder-index]
      summary: Aggregate-only Holder Index snapshot
      description: >-
        Aggregate-only membership continuity index, served from a static,
        hash-pinned snapshot generated by a founder-gated offline build from
        the VERIFIED member-continuity build (no runtime database read). Every
        aggregate carries its numbering-era provenance: seats numbered by the
        verified historical freeze / on-chain root versus seats numbered by V3
        engine events. Counts, era boundaries, timestamp coverage, and build
        provenance only — no per-seat rows, no directory, and no
        member-identifying data of any kind are ever returned. An offline
        reconciler re-derives this snapshot from the database and fails closed
        on any divergence.
      responses:
        "200":
          description: Aggregate-only, era-labelled Holder Index snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HolderIndexResponse"
components:
  schemas:
    ThrottledError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    SourceValidateResponse:
      type: object
      properties:
        mode:
          type: string
          enum:
            - READ_ONLY_SOURCE_VALIDATE
        asOf:
          type: string
        formatValid:
          type: boolean
        chainVerified:
          type: boolean
        registryCodePresent:
          anyOf:
            - type: boolean
            - type: "null"
        exists:
          anyOf:
            - type: boolean
            - type: "null"
        active:
          anyOf:
            - type: boolean
            - type: "null"
        failureReason:
          anyOf:
            - type: string
            - type: "null"
      required:
        - mode
        - asOf
        - formatValid
        - chainVerified
        - registryCodePresent
        - exists
        - active
        - failureReason
    JoinQuoteFigures:
      type: object
      description: EXACT raw base-unit strings from the V3 quote view (never humanized).
      properties:
        synOutRaw:
          type: string
        era:
          type: integer
        synPerUsdcRaw:
          type: string
        seatIfFirstRaw:
          type: string
        acquisitionCostRaw:
          type: string
        protocolContributionRaw:
          type: string
      required:
        - synOutRaw
        - era
        - synPerUsdcRaw
        - seatIfFirstRaw
        - acquisitionCostRaw
        - protocolContributionRaw
    VerifyLink:
      type: object
      properties:
        id:
          type: string
          enum:
            - membershipSaleV1
            - membershipSaleV2A
            - membershipSaleV2
            - membershipSaleV3
            - nftArchive
            - vaultWallet
            - operationsWallet
            - lpPair
            - synToken
            - burnAddress
            - sourceRegistry
        label:
          type: string
        url:
          type: string
      required:
        - id
        - label
        - url
    VerifyLinksResponse:
      type: object
      properties:
        mode:
          type: string
          enum:
            - READ_ONLY_VERIFY_LINKS
        note:
          type: string
        links:
          type: array
          items:
            $ref: "#/components/schemas/VerifyLink"
      required:
        - mode
        - note
        - links
    JoinQuoteResponse:
      type: object
      properties:
        mode:
          type: string
          enum:
            - READ_ONLY_JOIN_QUOTE
        asOf:
          type: string
        inputValid:
          type: boolean
        chainVerified:
          type: boolean
        sourceProvided:
          type: boolean
        sourceValid:
          anyOf:
            - type: boolean
            - type: "null"
        quote:
          anyOf:
            - $ref: "#/components/schemas/JoinQuoteFigures"
            - type: "null"
        decimals:
          type: object
          properties:
            usdc:
              type: integer
              enum:
                - 6
            syn:
              type: integer
              enum:
                - 18
          required:
            - usdc
            - syn
        failureReason:
          anyOf:
            - type: string
            - type: "null"
      required:
        - mode
        - asOf
        - inputValid
        - chainVerified
        - sourceProvided
        - sourceValid
        - quote
        - decimals
        - failureReason
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    SourceStatusItem:
      type: object
      properties:
        key:
          type: string
        label:
          type: string
        category:
          type: string
        posture:
          type: string
          enum:
            - READ_ONLY_PROOF
            - NOT_WIRED
            - VERIFIED_SOURCE_PENDING_ADAPTER
            - FUTURE
        publicClass:
          type: string
          enum:
            - SAFE_PUBLIC
            - INSTITUTIONAL_PUBLIC_SALE_SAFE
            - PUBLIC_MEMORY_SAFE
            - ECONOMIC_DASHBOARD_SAFE
            - MEMBER_ONLY
            - FOUNDER_OPERATOR_ONLY
            - INTERNAL_ONLY
            - FOUNDER_DECISION
            - BLOCKED_PUBLIC
        statusBadge:
          type: string
        sourceRef:
          type: string
        confidence:
          type: string
          enum:
            - high
            - medium
            - low
        note:
          type: string
        surface:
          type: string
        value:
          type: "null"
      required:
        - key
        - label
        - category
        - posture
        - publicClass
        - statusBadge
        - sourceRef
        - confidence
        - note
        - surface
        - value
    SourceStatusResponse:
      type: object
      properties:
        asOf:
          type: string
        generatedBy:
          type: string
          enum:
            - static-canon
        mode:
          type: string
          enum:
            - POSTURE_ONLY
        expectedChainId:
          type: integer
          enum:
            - 43114
        categories:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/SourceStatusItem"
      required:
        - asOf
        - generatedBy
        - mode
        - expectedChainId
        - categories
    ProtocolRealityItem:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        value:
          anyOf:
            - type: boolean
            - type: number
            - type: string
            - type: "null"
        valueType:
          type: string
          enum: ["null", "boolean", "string", "number"]
        sourceType:
          type: string
          enum:
            - SERVER_SIDE_CANON
            - LIVE_CHAIN_RPC
            - CANON_RECONCILED_RPC
            - INDEXED_CHAIN_SCAN
        sourceRef:
          type: string
        chainId:
          anyOf:
            - type: integer
            - type: "null"
        contractRole:
          anyOf:
            - type: string
              enum:
                - token
                - stablecoin
                - sale
                - source-registry
                - archive1155
                - lp-pair
            - type: "null"
        asOf:
          type: string
        confidence:
          type: string
          enum:
            - HIGH
            - MEDIUM
            - LOW
            - UNKNOWN
        lifecycle:
          type: string
          enum:
            - READ_ONLY_PROOF
            - PENDING_ADAPTER
            - NOT_ACTIVE
            - AUTH_REQUIRED
            - FOUNDER_GATED
            - FUTURE
            - PAUSED_BY_PRECAUTION
        publicSafe:
          type: boolean
        note:
          type: string
        failureReason:
          anyOf:
            - type: string
            - type: "null"
      required:
        - id
        - label
        - value
        - valueType
        - sourceType
        - sourceRef
        - chainId
        - contractRole
        - asOf
        - confidence
        - lifecycle
        - publicSafe
        - note
        - failureReason
    ProtocolRealityResponse:
      type: object
      properties:
        mode:
          type: string
          enum:
            - READ_ONLY_PROTOCOL_REALITY
        expectedChainId:
          type: integer
          enum:
            - 43114
        asOf:
          type: string
        cached:
          type: boolean
        cacheTtlMs:
          type: integer
          enum:
            - 30000
        groups:
          type: object
          properties:
            chain:
              type: array
              items:
                $ref: "#/components/schemas/ProtocolRealityItem"
            contracts:
              type: array
              items:
                $ref: "#/components/schemas/ProtocolRealityItem"
            tokens:
              type: array
              items:
                $ref: "#/components/schemas/ProtocolRealityItem"
            archive:
              type: array
              items:
                $ref: "#/components/schemas/ProtocolRealityItem"
            sale:
              type: array
              items:
                $ref: "#/components/schemas/ProtocolRealityItem"
            source:
              type: array
              items:
                $ref: "#/components/schemas/ProtocolRealityItem"
            financial:
              type: array
              items:
                $ref: "#/components/schemas/ProtocolRealityItem"
          required:
            - chain
            - contracts
            - tokens
            - archive
            - sale
            - source
            - financial
      required:
        - mode
        - expectedChainId
        - asOf
        - cached
        - cacheTtlMs
        - groups
    HolderIndexEra:
      type: object
      description: >-
        One numbering era's AGGREGATE view. Era provenance is always labelled;
        the two numbering authorities are never collapsed.
      properties:
        era:
          type: string
          enum:
            - PART_B_FREEZE_ROOT
            - V3_EMITTED
        label:
          type: string
        doctrine:
          type: string
        count:
          type: integer
        seatNumberLow:
          type: integer
        seatNumberHigh:
          type: integer
      required:
        - era
        - label
        - doctrine
        - count
        - seatNumberLow
        - seatNumberHigh
    HolderIndexResponse:
      type: object
      description: >-
        Static, hash-pinned, aggregate-only Holder Index snapshot. Counts and
        era boundaries only; no per-seat rows, no directory, no
        member-identifying data.
      properties:
        mode:
          type: string
          enum:
            - READ_ONLY_HOLDER_INDEX_AGGREGATES
        status:
          type: string
          enum:
            - VERIFIED
        chainId:
          type: integer
        freezeBlock:
          type: integer
        memberTotal:
          type: integer
        eras:
          type: array
          maxItems: 2
          items:
            $ref: "#/components/schemas/HolderIndexEra"
        timestampCoverage:
          type: object
          properties:
            withVerifiedTimestamp:
              type: integer
            total:
              type: integer
          required:
            - withVerifiedTimestamp
            - total
        provenance:
          type: object
          properties:
            runId:
              type: integer
            builtAt:
              type: string
            builderVersion:
              type: string
            sourceDeterminismHash:
              type: string
            inputSaleEventCount:
              type: integer
            inputMaxSaleEventRawId:
              anyOf:
                - type: integer
                - type: "null"
          required:
            - runId
            - builtAt
            - builderVersion
            - sourceDeterminismHash
            - inputSaleEventCount
            - inputMaxSaleEventRawId
        boundaries:
          type: array
          items:
            type: string
        snapshotHash:
          type: string
      required:
        - mode
        - status
        - chainId
        - freezeBlock
        - memberTotal
        - eras
        - timestampCoverage
        - provenance
        - boundaries
        - snapshotHash
