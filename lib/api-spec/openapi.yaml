openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: source-status
    description: Source posture registry (read-only, posture-only)
  - name: protocol-reality
    description: Read-only protocol reality envelope (canon + Avalanche C-Chain RPC)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /source-status:
    get:
      operationId: getSourceStatus
      tags: [source-status]
      summary: Source posture registry
      description: >-
        Posture-only, read-only source-status registry. Every category value is
        null by design; no live values, balances, addresses, or member data are
        ever returned.
      responses:
        "200":
          description: Posture-only source registry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceStatusResponse"
  /protocol/reality:
    get:
      operationId: getProtocolReality
      tags: [protocol-reality]
      summary: Read-only protocol reality envelope
      description: >-
        Read-only protocol observability envelope. Reads verified public facts
        from vendored canon and Avalanche C-Chain RPC — chain reachability,
        contract code presence, ERC-20 token metadata, archive posture, and
        read-only sale-engine state (lifecycle flags plus public V3 sale figures:
        available SYN, total gross USDC, and receipt count, surfaced as exact raw
        base units), normalized into one envelope. No addresses, private keys,
        secrets, per-account balances, or financial-upside framing are ever
        returned, and no wallet/write surface exists. On any read failure the
        affected value is null with an explicit lifecycle and failureReason; the
        endpoint still responds 200.
      responses:
        "200":
          description: Read-only protocol reality envelope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProtocolRealityResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    SourceStatusItem:
      type: object
      properties:
        key:
          type: string
        label:
          type: string
        category:
          type: string
        posture:
          type: string
          enum:
            - READ_ONLY_PROOF
            - NOT_WIRED
            - VERIFIED_SOURCE_PENDING_ADAPTER
            - FUTURE
        publicClass:
          type: string
          enum:
            - SAFE_PUBLIC
            - INSTITUTIONAL_PUBLIC_SALE_SAFE
            - PUBLIC_MEMORY_SAFE
            - ECONOMIC_DASHBOARD_SAFE
            - MEMBER_ONLY
            - FOUNDER_OPERATOR_ONLY
            - INTERNAL_ONLY
            - FOUNDER_DECISION
            - BLOCKED_PUBLIC
        statusBadge:
          type: string
        sourceRef:
          type: string
        confidence:
          type: string
          enum:
            - high
            - medium
            - low
        note:
          type: string
        surface:
          type: string
        value:
          type: "null"
      required:
        - key
        - label
        - category
        - posture
        - publicClass
        - statusBadge
        - sourceRef
        - confidence
        - note
        - surface
        - value
    SourceStatusResponse:
      type: object
      properties:
        asOf:
          type: string
        generatedBy:
          type: string
          enum:
            - static-canon
        mode:
          type: string
          enum:
            - POSTURE_ONLY
        expectedChainId:
          type: integer
          enum:
            - 43114
        categories:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/SourceStatusItem"
      required:
        - asOf
        - generatedBy
        - mode
        - expectedChainId
        - categories
    ProtocolRealityItem:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        value:
          anyOf:
            - type: boolean
            - type: number
            - type: string
            - type: "null"
        valueType:
          type: string
          enum: ["null", "boolean", "string", "number"]
        sourceType:
          type: string
          enum:
            - SERVER_SIDE_CANON
            - LIVE_CHAIN_RPC
            - CANON_RECONCILED_RPC
        sourceRef:
          type: string
        chainId:
          anyOf:
            - type: integer
            - type: "null"
        contractRole:
          anyOf:
            - type: string
              enum:
                - token
                - stablecoin
                - sale
                - source-registry
                - archive1155
                - lp-pair
            - type: "null"
        asOf:
          type: string
        confidence:
          type: string
          enum:
            - HIGH
            - MEDIUM
            - LOW
            - UNKNOWN
        lifecycle:
          type: string
          enum:
            - READ_ONLY_PROOF
            - PENDING_ADAPTER
            - NOT_ACTIVE
            - AUTH_REQUIRED
            - FOUNDER_GATED
            - FUTURE
            - PAUSED_BY_PRECAUTION
        publicSafe:
          type: boolean
        note:
          type: string
        failureReason:
          anyOf:
            - type: string
            - type: "null"
      required:
        - id
        - label
        - value
        - valueType
        - sourceType
        - sourceRef
        - chainId
        - contractRole
        - asOf
        - confidence
        - lifecycle
        - publicSafe
        - note
        - failureReason
    ProtocolRealityResponse:
      type: object
      properties:
        mode:
          type: string
          enum:
            - READ_ONLY_PROTOCOL_REALITY
        expectedChainId:
          type: integer
          enum:
            - 43114
        asOf:
          type: string
        cached:
          type: boolean
        groups:
          type: object
          properties:
            chain:
              type: array
              items:
                $ref: "#/components/schemas/ProtocolRealityItem"
            contracts:
              type: array
              items:
                $ref: "#/components/schemas/ProtocolRealityItem"
            tokens:
              type: array
              items:
                $ref: "#/components/schemas/ProtocolRealityItem"
            archive:
              type: array
              items:
                $ref: "#/components/schemas/ProtocolRealityItem"
            sale:
              type: array
              items:
                $ref: "#/components/schemas/ProtocolRealityItem"
          required:
            - chain
            - contracts
            - tokens
            - archive
            - sale
      required:
        - mode
        - expectedChainId
        - asOf
        - cached
        - groups
